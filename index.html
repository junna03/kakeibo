const fmt=n=>`¥${Math.round(Number(n)||0).toLocaleString("ja-JP")}`;
const todayStr=()=>new Date().toISOString().split("T")[0];
function addDays(d,n){const dt=new Date(d);dt.setDate(dt.getDate()+n);return dt.toISOString().split("T")[0];}
function getMonday(d){const dt=new Date(d);const day=dt.getDay();dt.setDate(dt.getDate()-(day===0?6:day-1));return dt.toISOString().split("T")[0];}
function getMonthStart(d){const dt=new Date(d);return `${dt.getFullYear()}-${String(dt.getMonth()+1).padStart(2,"0")}-01`;}
function getMonthEnd(d){const dt=new Date(d);return new Date(dt.getFullYear(),dt.getMonth()+1,0).toISOString().split("T")[0];}
function fmtDate(d){const dt=new Date(d);return `${dt.getMonth()+1}/${dt.getDate()}(${["日","月","火","水","木","金","土"][dt.getDay()]})`;}
function fmtMonth(d){const dt=new Date(d);return `${dt.getFullYear()}年${dt.getMonth()+1}月`;}
function darken(hex){const n=parseInt(hex.slice(1),16);const r=((n>>16)&255)*0.55,g=((n>>8)&255)*0.55,b=(n&255)*0.55;return `rgb(${r|0},${g|0},${b|0})`;}

async function sg(k){return localStorage.getItem(k);}
async function ss(k,v){localStorage.setItem(k,v);}
function monthKey(d){return "mexp:"+d.substring(0,7);}
function dayKey(d){return d.substring(8,10);}
async function getMonthData(d){const r=await sg(monthKey(d));return r?JSON.parse(r):{};}
async function saveDayData(dateStr,items){
  const data=await getMonthData(dateStr);
  if(items.length===0){delete data[dayKey(dateStr)];}else{data[dayKey(dateStr)]=items;}
  await ss(monthKey(dateStr),JSON.stringify(data));
  if(items.length>0){await ss(`exp:${dateStr}`,JSON.stringify(items));}else{localStorage.removeItem(`exp:${dateStr}`);}
}
async function loadDayData(dateStr){
  const data=await getMonthData(dateStr);
  const fm=data[dayKey(dateStr)]||null;if(fm)return fm;
  const old=await sg(`exp:${dateStr}`);return old?JSON.parse(old):[];
}
async function loadMonthData(ms){
  const raw=await sg(monthKey(ms));
  if(raw){const data=JSON.parse(raw),out={},y=ms.substring(0,4),m=ms.substring(5,7);Object.entries(data).forEach(([dd,it])=>{out[`${y}-${m}-${dd}`]=it;});return out;}
  const end=getMonthEnd(ms),dates=[];
  for(let d=ms;d<=end;d=addDays(d,1))dates.push(d);
  const results=await Promise.all(dates.map(d=>sg(`exp:${d}`)));
  const out={};dates.forEach((d,i)=>{if(results[i])out[d]=JSON.parse(results[i]);});
  if(Object.keys(out).length>0){const nd={};Object.entries(out).forEach(([d,it])=>{nd[dayKey(d)]=it;});await ss(monthKey(ms),JSON.stringify(nd));}
  return out;
}
const monthCache={};
async function loadMonthDataCached(ms,forceReload=false){
  if(!forceReload&&monthCache[ms])return monthCache[ms];
  const data=await loadMonthData(ms);monthCache[ms]=data;return data;
}
async function loadRange(start,end){
  const months=new Set();for(let d=start;d<=end;d=addDays(d,1))months.add(getMonthStart(d));
  const arr=await Promise.all([...months].map(m=>loadMonthDataCached(m)));
  const merged={};arr.forEach(md=>Object.assign(merged,md));
  const out={};Object.entries(merged).forEach(([d,it])=>{if(d>=start&&d<=end)out[d]=it;});return out;
}
async function callClaude(messages,maxTokens=1000){
  if(!CLAUDE_API_KEY) throw new Error('APIキー未設定です。設定タブ→「🔑 APIキー」から設定してください');
  const res=await fetch("https://api.anthropic.com/v1/messages",{method:"POST",headers:{"Content-Type":"application/json","x-api-key":CLAUDE_API_KEY,"anthropic-version":"2023-06-01","anthropic-dangerous-direct-browser-access":"true"},body:JSON.stringify({model:"claude-sonnet-4-20250514",max_tokens:maxTokens,messages})});
  const data=await res.json();if(data.error)throw new Error(data.error.message||"API Error");
  return data.content?.map(b=>b.text||"").join("\n")||"";
}
async function parseNaturalInput(text,categories){
  const catList=categories.map(c=>`"${c.id}":${c.name}`).join(",");
  const raw=await callClaude([{role:"user",content:`家計簿。以下のテキストから支出を読み取りJSON配列のみ返してください（説明不要）。\nテキスト:\n"${text}"\nカテゴリ:{${catList}}\nルール:スーパー/コンビニ→food,電車/バス→transport,薬局/病院→health,服/化粧品→fashion,ゲーム/映画→leisure,ネット/サブスク→telecom,レストラン/外食→dining,本→education。\n複数行は行ごとに別エントリ。noteは15文字以内。\n[{"categoryId":"...","amount":数値,"note":"..."}]`}],400);
  try{const a=raw.match(/\[[\s\S]*\]/);if(a)return JSON.parse(a[0]);const o=raw.match(/\{[\s\S]*?\}/);return o?[JSON.parse(o[0])]:null;}catch{return null;}
}
async function parseReceipt(base64Image,categories){
  const catList=categories.map(c=>`"${c.id}":${c.name}`).join(",");
  const raw=await callClaude([{role:"user",content:[{type:"image",source:{type:"base64",media_type:"image/jpeg",data:base64Image}},{type:"text",text:`レシートから支出を読み取りJSON配列のみ返してください。カテゴリ:{${catList}} 合算しカテゴリ別に1〜3件で。[{"categoryId":"...","amount":数値,"note":"..."}]`}]}],400);
  try{const m=raw.match(/\[[\s\S]*\]/);return m?JSON.parse(m[0]):null;}catch{return null;}
}
function summarize(settings,expByDate){
  const catMap={};settings.categories.forEach(c=>{catMap[c.id]={...c,total:0,items:[]};});let grand=0;
  Object.entries(expByDate).forEach(([date,items])=>{(items||[]).forEach(item=>{if(catMap[item.categoryId]){catMap[item.categoryId].total+=Number(item.amount);catMap[item.categoryId].items.push({date,...item});}grand+=Number(item.amount);});});
  return{catMap,grandTotal:grand};
}

const PASSPHRASE="AI家計簿";
function LockScreen({onUnlock}){
  const [input,setInput]=useState('');const [shake,setShake]=useState(false);const [unlocking,setUnlocking]=useState(false);
  const tryUnlock=()=>{if(input===PASSPHRASE){setUnlocking(true);setTimeout(()=>onUnlock(),600);}else{setShake(true);setTimeout(()=>setShake(false),500);setInput('');}};
  return h("div",{style:{minHeight:"100vh",background:"linear-gradient(160deg,#FFE0EC,#EDD5FF,#C5EDF5)",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",fontFamily:font,padding:24,animation:unlocking?"unlock .6s ease forwards":"none"}},
    h("div",{style:{fontSize:52,marginBottom:8,animation:"floatAnim 3s ease-in-out infinite"}},"🌸"),
    h("h1",{style:{fontFamily:"'Klee One',serif",fontSize:24,fontWeight:600,color:C.text,letterSpacing:6,marginBottom:4}},"かけいぼ"),
    h("p",{style:{fontSize:12,color:C.textSub,marginBottom:36,letterSpacing:2}},"合言葉を入力してください"),
    h("div",{style:{background:"white",borderRadius:24,padding:"28px 24px",boxShadow:"0 8px 32px rgba(244,143,177,0.2)",border:"1px solid #F0D8F0",width:"100%",maxWidth:320,animation:shake?"shakeX .4s ease":"none"}},
      h("input",{type:"text",placeholder:"合言葉を入力…",value:input,onChange:e=>setInput(e.target.value),onKeyDown:e=>e.key==="Enter"&&tryUnlock(),autoFocus:true,style:{width:"100%",padding:"12px 16px",border:"1.5px solid #F0D8F0",borderRadius:14,fontSize:16,background:"#FFF8FB",color:C.text,textAlign:"center",letterSpacing:3,marginBottom:14}}),
      h("button",{onClick:tryUnlock,style:{width:"100%",padding:"13px",borderRadius:30,border:"none",cursor:"pointer",background:"linear-gradient(135deg,#F9A8C9,#F48FB1)",color:"white",fontFamily:font,fontSize:14,fontWeight:700,boxShadow:"0 4px 14px rgba(244,143,177,0.35)",transition:"all .18s"}},"✨ ひらく")
    ),
    h("p",{style:{fontSize:11,color:"#CDB8DC",marginTop:24}},"合言葉を知っている人だけが使えます")
  );
}

function SetupView({settings,onSave,onApiKeyChange}){
  const [sub,setSub]=useState("categories");
  const [nc,setNc]=useState({name:"",icon:PRESET_ICONS[0],color:PRESET_COLORS[0]});
  const [nf,setNf]=useState({name:"",amount:"",categoryId:""});
  const [aiPrompt,setAiPrompt]=useState("");
  const [aiLoading,setAiLoading]=useState(false);
  const [aiSuggestions,setAiSuggestions]=useState([]);
  const [aiToast,setAiToast]=useState("");
  const showAiToast=msg=>{setAiToast(msg);setTimeout(()=>setAiToast(""),2400);};
  const generateCategories=async()=>{
    if(!aiPrompt.trim())return;setAiLoading(true);setAiSuggestions([]);
    try{
      const existing=settings.categories.map(c=>c.name).join("、")||"なし";
      const raw=await callClaude([{role:"user",content:`家計簿カテゴリをJSON配列のみで返してください。説明不要。\n状況:「${aiPrompt}」\n既存カテゴリ(重複不可):${existing}\n重要ルール:状況に直結するカテゴリのみ提案。矛盾は不可。\n4個。形式:[{"name":"名前","icon":"絵文字1つ","color":"#パステルカラー"}]`}],150);
      const clean=raw.replace(/```[a-z]*\n?/gi,"").replace(/```/g,"").trim();
      const m=clean.match(/\[[\s\S]*\]/);if(!m)throw new Error();
      const list=JSON.parse(m[0]);if(!Array.isArray(list)||list.length===0)throw new Error();
      setAiSuggestions(list.map((item,i)=>({name:String(item.name||"カテゴリ").slice(0,12),icon:String(item.icon||"✨"),color:/^#[0-9A-Fa-f]{6}$/.test(item.color)?item.color:PRESET_COLORS[i%PRESET_COLORS.length]})));
    }catch{showAiToast("💦 生成に失敗しました。もう一度お試しください");}
    setAiLoading(false);
  };
  const addSuggestion=item=>{
    if(settings.categories.some(c=>c.name===item.name)){showAiToast(`「${item.name}」は既に追加されています`);return;}
    onSave({...settings,categories:[...settings.categories,{id:Date.now().toString(),...item}]});
    setAiSuggestions(prev=>prev.filter(s=>s.name!==item.name));showAiToast(`✨「${item.name}」を追加しました！`);
  };
  const addAllSuggestions=()=>{
    const newCats=aiSuggestions.filter(item=>!settings.categories.some(c=>c.name===item.name)).map(item=>({id:Date.now().toString()+Math.random(),...item}));
    if(newCats.length===0){showAiToast("すべて追加済みです");return;}
    onSave({...settings,categories:[...settings.categories,...newCats]});setAiSuggestions([]);showAiToast(`✨ ${newCats.length}件を追加しました！`);
  };
  const addCat=()=>{if(!nc.name.trim())return;onSave({...settings,categories:[...settings.categories,{id:Date.now().toString(),...nc}]});setNc({name:"",icon:PRESET_ICONS[0],color:PRESET_COLORS[0]});showAiToast(`✨「${nc.name}」を追加しました！`);};
  const remCat=id=>onSave({...settings,categories:settings.categories.filter(c=>c.id!==id)});
  const addFixed=()=>{if(!nf.name.trim()||!nf.amount)return;onSave({...settings,fixedCosts:[...settings.fixedCosts,{id:Date.now().toString(),...nf}]});setNf({name:"",amount:"",categoryId:""});};
  const remFixed=id=>onSave({...settings,fixedCosts:settings.fixedCosts.filter(f=>f.id!==id)});
  const tb=k=>({flex:1,padding:"8px 4px",borderRadius:13,border:`2px solid ${sub===k?C.pink:C.border}`,background:sub===k?C.pinkL:"white",color:sub===k?C.text:C.textSub,fontFamily:font,fontWeight:700,fontSize:11,cursor:"pointer",transition:"all .2s"});

      h("div",{style:{display:"flex",alignItems:"center",justifyContent:"center",gap:10}},h("span",{style:{fontSize:26,animation:"floatAnim 3s ease-in-out infinite"}},"🌸"),h("h1",{style:{fontFamily:"'Klee One',serif",fontSize:21,fontWeight:600,color:C.text,letterSpacing:7}},"かけいぼ"),h("span",{style:{fontSize:26,animation:"floatAnim 3s ease-in-out infinite",animationDelay:".6s"}},"💕"))

    h("nav",{style:{display:"flex",background:"white",borderBottom:`1px solid ${C.border}`,boxShadow:`0 2px 10px ${C.shadow}`,position:"sticky",top:0,zIndex:30}},
      TABS.map(([k,ic,lb])=>h("button",{key:k,onClick:()=>setTab(k),style:{flex:1,padding:"11px 4px 10px",border:"none",cursor:"pointer",fontFamily:font,fontSize:11,fontWeight:700,letterSpacing:.5,lineHeight:1.5,background:tab===k?"linear-gradient(to bottom,#FFF0F7,white)":"transparent",color:tab===k?C.text:C.textLight,borderBottom:tab===k?`2.5px solid ${C.pink}`:"2.5px solid transparent",transition:"all .2s"}},ic,h("br"),lb))
    ),
    h("div",{style:{flex:1,overflowY:"auto",padding:"14px 13px 44px"}},
      tab==="setup"    &&h(SetupView,   {settings,onSave:saveSettings,onApiKeyChange:()=>setHasApiKey(false)}),
      tab==="daily"    &&h(DailyView,   {settings,onDataChange:()=>setDataVersion(v=>v+1)}),
      tab==="calendar" &&h(CalendarView,{settings,dataVersion}),
      tab==="reports"  &&h(ReportsView, {settings})
    )
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(h(App,null));
</script>
</body>
</html>
