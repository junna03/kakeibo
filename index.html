// ── AI呼び出し（全プロバイダ共通） ────────────────────────
async function callAI(messages, maxTokens) {
  maxTokens = maxTokens || 1000;
  if (!AI_KEY) throw new Error('APIキーが設定されていません。\n設定タブ → 🤖 AIキー から設定してください。');

  if (AI_PROVIDER === 'anthropic') {
    const res = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'x-api-key': AI_KEY,
        'anthropic-version': '2023-06-01',
        'anthropic-dangerous-direct-browser-access': 'true',
      },
      body: JSON.stringify({ model: PROVIDERS.anthropic.model, max_tokens: maxTokens, messages }),
    });
    const d = await res.json();
    if (d.error) throw new Error('Anthropic エラー: ' + d.error.message);
    return (d.content || []).map(b => b.text || '').join('\n');
  }

  if (AI_PROVIDER === 'openai') {
    const oaiMsgs = messages.map(m => {
      if (typeof m.content === 'string') return { role: m.role, content: m.content };
      return {
        role: m.role,
        content: m.content.map(p => {
          if (p.type === 'text') return { type: 'text', text: p.text };
          if (p.type === 'image') return { type: 'image_url', image_url: { url: 'data:' + p.source.media_type + ';base64,' + p.source.data } };
          return null;
        }).filter(Boolean),
      };
    });
    const res = await fetch('https://api.openai.com/v1/chat/completions', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + AI_KEY },
      body: JSON.stringify({ model: PROVIDERS.openai.model, max_tokens: maxTokens, messages: oaiMsgs }),
    });
    const d = await res.json();
    if (d.error) throw new Error('OpenAI エラー: ' + d.error.message);
    return (d.choices && d.choices[0] && d.choices[0].message && d.choices[0].message.content) || '';
  }

  if (AI_PROVIDER === 'gemini') {
    const url = 'https://generativelanguage.googleapis.com/v1beta/models/' + PROVIDERS.gemini.model + ':generateContent?key=' + AI_KEY;
    const contents = messages.map(m => {
      const role = m.role === 'assistant' ? 'model' : 'user';
      if (typeof m.content === 'string') return { role, parts: [{ text: m.content }] };
      return {
        role,
        parts: m.content.map(p => {
          if (p.type === 'text') return { text: p.text };
          if (p.type === 'image') return { inline_data: { mime_type: p.source.media_type, data: p.source.data } };
          return null;
        }).filter(Boolean),
      };
    });
    const res = await fetch(url, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ contents, generationConfig: { maxOutputTokens: maxTokens } }),
    });
    const d = await res.json();
    if (d.error) throw new Error('Gemini エラー: ' + (d.error.message || d.error.status));
    return ((d.candidates && d.candidates[0] && d.candidates[0].content && d.candidates[0].content.parts) || []).map(p => p.text || '').join('\n');
  }

  throw new Error('未対応のプロバイダです: ' + AI_PROVIDER);
}

// ── ユーティリティ ────────────────────────────────────────
const fmt = n => '¥' + Math.round(Number(n) || 0).toLocaleString('ja-JP');
const todayStr = () => new Date().toISOString().split('T')[0];
function addDays(d, n) { const dt = new Date(d); dt.setDate(dt.getDate() + n); return dt.toISOString().split('T')[0]; }
function getMonday(d) { const dt = new Date(d); const day = dt.getDay(); dt.setDate(dt.getDate() - (day === 0 ? 6 : day - 1)); return dt.toISOString().split('T')[0]; }
function getMonthStart(d) { const dt = new Date(d); return dt.getFullYear() + '-' + String(dt.getMonth() + 1).padStart(2, '0') + '-01'; }
function getMonthEnd(d) { const dt = new Date(d); return new Date(dt.getFullYear(), dt.getMonth() + 1, 0).toISOString().split('T')[0]; }
function fmtDate(d) { const dt = new Date(d); return (dt.getMonth() + 1) + '/' + dt.getDate() + '(' + ['日','月','火','水','木','金','土'][dt.getDay()] + ')'; }
function fmtMonth(d) { const dt = new Date(d); return dt.getFullYear() + '年' + (dt.getMonth() + 1) + '月'; }
function darken(hex) { const n = parseInt(hex.slice(1), 16); return 'rgb(' + (((n >> 16) & 255) * 0.55 | 0) + ',' + (((n >> 8) & 255) * 0.55 | 0) + ',' + ((n & 255) * 0.55 | 0) + ')'; }

// ── ストレージ ────────────────────────────────────────────
const sg = k => localStorage.getItem(k);
const ss = (k, v) => localStorage.setItem(k, v);
const sd = k => localStorage.removeItem(k);
const monthKey = d => 'mexp:' + d.substring(0, 7);
const dayKey   = d => d.substring(8, 10);

function getMonthData(d) { const r = sg(monthKey(d)); return r ? JSON.parse(r) : {}; }
function saveDayData(dateStr, items) {
  const data = getMonthData(dateStr);
  if (items.length === 0) { delete data[dayKey(dateStr)]; } else { data[dayKey(dateStr)] = items; }
  ss(monthKey(dateStr), JSON.stringify(data));
  if (items.length > 0) { ss('exp:' + dateStr, JSON.stringify(items)); } else { sd('exp:' + dateStr); }
}
function loadDayData(dateStr) {
  const data = getMonthData(dateStr);
  const fm = data[dayKey(dateStr)];
  if (fm) return fm;
  const old = sg('exp:' + dateStr);
  return old ? JSON.parse(old) : [];
}
function loadMonthData(ms) {
  const raw = sg(monthKey(ms));
  if (raw) {
    const data = JSON.parse(raw), out = {}, y = ms.substring(0, 4), m = ms.substring(5, 7);
    Object.entries(data).forEach(([dd, it]) => { out[y + '-' + m + '-' + dd] = it; });
    return out;
  }
  const end = getMonthEnd(ms), out = {};
  for (let d = ms; d <= end; d = addDays(d, 1)) {
    const r = sg('exp:' + d);
    if (r) out[d] = JSON.parse(r);
  }
  if (Object.keys(out).length > 0) {
    const nd = {};
    Object.entries(out).forEach(([d, it]) => { nd[dayKey(d)] = it; });
    ss(monthKey(ms), JSON.stringify(nd));
  }
  return out;
}

const monthCache = {};
function loadMonthDataCached(ms, forceReload) {
  if (!forceReload && monthCache[ms]) return monthCache[ms];
  monthCache[ms] = loadMonthData(ms);
  return monthCache[ms];
}
function loadRange(start, end) {
  const months = new Set();
  for (let d = start; d <= end; d = addDays(d, 1)) months.add(getMonthStart(d));
  const merged = {};
  months.forEach(m => Object.assign(merged, loadMonthDataCached(m)));
  const out = {};
  Object.entries(merged).forEach(([d, it]) => { if (d >= start && d <= end) out[d] = it; });
  return out;
}

// ── AI解析 ────────────────────────────────────────────────
async function parseNaturalInput(text, categories) {
  const catList = categories.map(c => '"' + c.id + '":' + c.name).join(',');
  const raw = await callAI([{
    role: 'user',
    content: '家計簿。以下のテキストから支出を読み取りJSON配列のみ返してください（説明不要）。\nテキスト:\n"' + text + '"\nカテゴリ:{' + catList + '}\nルール:スーパー/コンビニ→food,電車/バス→transport,薬局/病院→health,服/化粧品→fashion,ゲーム/映画→leisure,ネット/サブスク→telecom,レストラン/外食→dining,本→education。\n複数行は行ごとに別エントリ。noteは15文字以内。\n[{"categoryId":"...","amount":数値,"note":"..."}]',
  }], 400);
  try {
    const a = raw.match(/\[[\s\S]*\]/);
    if (a) return JSON.parse(a[0]);
    const o = raw.match(/\{[\s\S]*?\}/);
    return o ? [JSON.parse(o[0])] : null;
  } catch (e) { return null; }
}

async function parseReceipt(base64Image, categories) {
  const catList = categories.map(c => '"' + c.id + '":' + c.name).join(',');
  const raw = await callAI([{
    role: 'user',
    content: [
      { type: 'image', source: { type: 'base64', media_type: 'image/jpeg', data: base64Image } },
      { type: 'text', text: 'レシートから支出を読み取りJSON配列のみ返してください。カテゴリ:{' + catList + '} 合算しカテゴリ別に1〜3件で。[{"categoryId":"...","amount":数値,"note":"..."}]' },
    ],
  }], 400);
  try { const m = raw.match(/\[[\s\S]*\]/); return m ? JSON.parse(m[0]) : null; }
  catch (e) { return null; }
}

function summarize(settings, expByDate) {
  const catMap = {};
  settings.categories.forEach(c => { catMap[c.id] = Object.assign({}, c, { total: 0, items: [] }); });
  let grand = 0;
  Object.entries(expByDate).forEach(([date, items]) => {
    (items || []).forEach(item => {
      if (catMap[item.categoryId]) { catMap[item.categoryId].total += Number(item.amount); catMap[item.categoryId].items.push(Object.assign({ date }, item)); }
      grand += Number(item.amount);
    });
  });
  return { catMap, grandTotal: grand };
}

function PillBtn(props) {
  const { children, onClick, variant, size, disabled, full, style: ex } = props;
  const v = variant || 'primary';
  const bg = v === 'primary'  ? 'linear-gradient(135deg,#F9A8C9,' + C.pink + ')' :
             v === 'mint'     ? 'linear-gradient(135deg,#C8F7E8,' + C.mint + ')' :
             v === 'lavender' ? 'linear-gradient(135deg,#E0D4FF,' + C.lavender + ')' :
             v === 'danger'   ? 'linear-gradient(135deg,#FFB3C6,#F48FB1)' :
             v === 'ghost'    ? 'transparent' : 'white';
  const col    = ['primary','mint','lavender','danger'].includes(v) ? C.text : C.textSub;
  const border = v === 'ghost' ? '1.5px dashed ' + C.border : '1.5px solid ' + C.border;
  const pd     = size === 'sm' ? '5px 12px' : '10px 20px';
  return h('button', {
    onClick, disabled,
    style: Object.assign({
      padding:pd, borderRadius:30, border, cursor:disabled?'not-allowed':'pointer',
      background:bg, color:col, fontFamily:font, fontSize:size==='sm'?12:13, fontWeight:700,
      letterSpacing:.5, transition:'all .18s', opacity:disabled?.55:1,
      boxShadow:['primary','mint','lavender'].includes(v) ? '0 4px 14px ' + C.shadow : 'none',
      whiteSpace:'nowrap', width:full?'100%':'auto',
      display:'inline-flex', alignItems:'center', justifyContent:'center', gap:4,
    }, ex || {}),
  }, children);
}

// ── 設定 ──────────────────────────────────────────────────
function SetupView(props) {
  const { settings, onSave } = props;
  const [sub,  setSub]  = useState('categories');
  const [nc,   setNc]   = useState({ name:'', icon:PRESET_ICONS[0], color:PRESET_COLORS[0] });
  const [nf,   setNf]   = useState({ name:'', amount:'', categoryId:'' });
  const [aiPrompt,      setAiPrompt]      = useState('');
  const [aiLoading,     setAiLoading]     = useState(false);
  const [aiSuggestions, setAiSuggestions] = useState([]);
  const [toast,         setToast]         = useState('');

  const showToast = msg => { setToast(msg); setTimeout(() => setToast(''), 2400); };

  const genCategories = async () => {
    if (!aiPrompt.trim()) return;
    setAiLoading(true); setAiSuggestions([]);
    try {
      const existing = settings.categories.map(c => c.name).join('、') || 'なし';
      const raw = await callAI([{ role:'user', content:'家計簿カテゴリをJSON配列のみで返してください。説明不要。\n状況:「' + aiPrompt + '」\n既存カテゴリ(重複不可):' + existing + '\n重要:状況に直結するカテゴリのみ提案。矛盾は不可。\n4個。形式:[{"name":"名前","icon":"絵文字1つ","color":"#パステルカラー"}]' }], 200);
      const clean = raw.replace(/```[a-z]*\n?/gi, '').replace(/```/g, '').trim();
      const m = clean.match(/\[[\s\S]*\]/);
      if (!m) throw new Error('JSON not found');
      const list = JSON.parse(m[0]);
      if (!Array.isArray(list) || list.length === 0) throw new Error('empty');
      setAiSuggestions(list.map((item, i) => ({
        name:  String(item.name  || 'カテゴリ').slice(0, 12),
        icon:  String(item.icon  || '✨'),
        color: /^#[0-9A-Fa-f]{6}$/.test(item.color) ? item.color : PRESET_COLORS[i % PRESET_COLORS.length],
      })));
    } catch (e) {
      showToast('💦 生成に失敗しました: ' + e.message);
    }
    setAiLoading(false);
  };

  const addSuggestion = item => {
    if (settings.categories.some(c => c.name === item.name)) { showToast('「' + item.name + '」は既に追加されています'); return; }
    onSave(Object.assign({}, settings, { categories: settings.categories.concat([Object.assign({ id:Date.now().toString() }, item)]) }));
    setAiSuggestions(prev => prev.filter(s => s.name !== item.name));
    showToast('✨「' + item.name + '」を追加しました！');
  };

  const addAll = () => {
    const newCats = aiSuggestions.filter(item => !settings.categories.some(c => c.name === item.name)).map(item => Object.assign({ id: Date.now().toString() + Math.random() }, item));
    if (newCats.length === 0) { showToast('すべて追加済みです'); return; }
    onSave(Object.assign({}, settings, { categories: settings.categories.concat(newCats) }));
    setAiSuggestions([]); showToast('✨ ' + newCats.length + '件を追加しました！');
  };

  const addCat = () => {
    if (!nc.name.trim()) return;
    onSave(Object.assign({}, settings, { categories: settings.categories.concat([Object.assign({ id:Date.now().toString() }, nc)]) }));
    setNc({ name:'', icon:PRESET_ICONS[0], color:PRESET_COLORS[0] });
    showToast('✨「' + nc.name + '」を追加しました！');
  };

  const tb = k => ({ flex:1, padding:'8px 4px', borderRadius:13, border:'2px solid ' + (sub===k?C.pink:C.border), background:sub===k?C.pinkL:'white', color:sub===k?C.text:C.textSub, fontFamily:font, fontWeight:700, fontSize:11, cursor:'pointer', transition:'all .2s' });

  return h('div', { style:{ position:'relative' } },
    toast && h('div', { style:{ position:'fixed', top:70, left:'50%', transform:'translateX(-50%)', zIndex:999, background:'white', border:'1.5px solid ' + C.pinkL, borderRadius:20, padding:'10px 22px', boxShadow:'0 8px 28px ' + C.shadow, fontWeight:700, fontSize:13, color:C.text, whiteSpace:'nowrap', animation:'popIn .3s ease forwards' } }, toast),

    h('div', { style:{ display:'flex', gap:6, marginBottom:14 } },
      h('button', { onClick:()=>setSub('categories'), style:tb('categories') }, '🏷️ カテゴリ'),
      h('button', { onClick:()=>setSub('fixed'),      style:tb('fixed') },      '🏠 固定費'),
      h('button', { onClick:()=>setSub('apikey'),     style:tb('apikey') },     '🤖 AIキー')
    ),

    sub === 'categories' && h(Fragment, null,
      h('div', { style:card },
        h('p', { style:cardTitle }, '🤖 AIでカテゴリを自動生成'),
        h('p', { style:{ fontSize:11, color:C.textSub, marginBottom:10, lineHeight:1.7 } }, 'あなたの生活スタイルを教えると、ぴったりのカテゴリを提案するよ✨'),
        h('input', { style:Object.assign({}, inp, { marginBottom:10 }), placeholder:'例：小学生の子供がいて、ペットもいます', value:aiPrompt, onChange:e=>setAiPrompt(e.target.value), onKeyDown:e=>e.key==='Enter'&&genCategories() }),
        h(PillBtn, { onClick:genCategories, disabled:aiLoading||!aiPrompt.trim(), variant:'lavender', full:true }, aiLoading ? '⏳ 生成中…' : '✨ カテゴリを提案してもらう'),
        aiSuggestions.length > 0 && h('div', { style:{ marginTop:14, animation:'slideUp .3s ease' } },
          h('div', { style:{ display:'flex', justifyContent:'space-between', alignItems:'center', marginBottom:10 } },
            h('p', { style:{ fontSize:12, fontWeight:700, color:C.text } }, '💡 提案されたカテゴリ'),
            h(PillBtn, { onClick:addAll, variant:'mint', size:'sm' }, 'すべて追加')
          ),
          aiSuggestions.map((item, i) =>
            h('div', { key:i, style:{ display:'flex', alignItems:'center', gap:10, background:C.bgSoft, borderRadius:13, padding:'10px 12px', border:'1px solid ' + C.border, marginBottom:8 } },
              h('span', { style:{ fontSize:22 } }, item.icon),
              h('div', { style:{ flex:1 } },
                h('p', { style:{ fontWeight:700, fontSize:13, color:C.text } }, item.name),
                h('div', { style:{ width:40, height:5, borderRadius:3, background:item.color, marginTop:3 } })
              ),
              h(PillBtn, { onClick:()=>addSuggestion(item), variant:'primary', size:'sm' }, '＋ 追加')
            )
          )
        )
      ),
      h('div', { style:card },
        h('p', { style:cardTitle }, '✏️ 自分でカテゴリを追加'),
        h('label', { style:lbl }, '名前'),
        h('input', { style:Object.assign({}, inp, { marginBottom:10 }), placeholder:'例：推し活', value:nc.name, onChange:e=>setNc(Object.assign({}, nc, { name:e.target.value })) }),
        h('label', { style:lbl }, 'アイコン'),
        h('div', { style:{ display:'flex', flexWrap:'wrap', gap:5, marginBottom:10 } },
          PRESET_ICONS.map(ic => h('button', { key:ic, onClick:()=>setNc(Object.assign({}, nc, { icon:ic })), style:{ width:34, height:34, borderRadius:9, border:'2px solid ' + (nc.icon===ic?C.pink:C.border), background:nc.icon===ic?C.pinkL:'white', cursor:'pointer', fontSize:16, transition:'all .15s' } }, ic))
        ),
        h('label', { style:lbl }, 'カラー'),
        h('div', { style:{ display:'flex', gap:7, flexWrap:'wrap', marginBottom:13 } },
          PRESET_COLORS.map(cl => h('button', { key:cl, onClick:()=>setNc(Object.assign({}, nc, { color:cl })), style:{ width:24, height:24, borderRadius:'50%', background:cl, cursor:'pointer', border:'3px solid ' + (nc.color===cl?C.text:'white'), boxShadow:'0 2px 8px ' + cl, transition:'all .15s' } }))
        ),
        h(PillBtn, { onClick:addCat, full:true }, '＋ 追加する')
      ),
      h('div', { style:card },
        h('p', { style:cardTitle }, '🏷️ カテゴリ一覧 (' + settings.categories.length + '件)'),
        settings.categories.length === 0 && h('p', { style:{ color:C.textLight, fontSize:13, textAlign:'center', padding:'8px 0' } }, 'まだありません'),
        settings.categories.map(c =>
          h('div', { key:c.id, style:{ display:'flex', alignItems:'center', gap:10, padding:'8px 0', borderBottom:'1px dashed ' + C.border } },
            h(Tag, { icon:c.icon, name:c.name, color:c.color }),
            h('div', { style:{ flex:1, height:6, borderRadius:4, background:c.color } }),
            h(PillBtn, { onClick:()=>onSave(Object.assign({}, settings, { categories:settings.categories.filter(x=>x.id!==c.id) })), variant:'danger', size:'sm' }, '✕')
          )
        )
      )
    ),

    sub === 'fixed' && h(Fragment, null,
      h('div', { style:card },
        h('p', { style:cardTitle }, '➕ 固定費を追加'),
        h('label', { style:lbl }, '項目名'),
        h('input', { style:Object.assign({}, inp, { marginBottom:10 }), placeholder:'例：家賃', value:nf.name, onChange:e=>setNf(Object.assign({}, nf, { name:e.target.value })) }),
        h('label', { style:lbl }, '金額（円）'),
        h('input', { style:Object.assign({}, inp, { marginBottom:10 }), type:'number', placeholder:'0', value:nf.amount, onChange:e=>setNf(Object.assign({}, nf, { amount:e.target.value })) }),
        h('label', { style:lbl }, 'カテゴリ（任意）'),
        h('select', { style:Object.assign({}, inp, { cursor:'pointer', marginBottom:13 }), value:nf.categoryId, onChange:e=>setNf(Object.assign({}, nf, { categoryId:e.target.value })) },
          h('option', { value:'' }, 'なし'),
          settings.categories.map(c => h('option', { key:c.id, value:c.id }, c.icon + ' ' + c.name))
        ),
        h(PillBtn, { onClick:()=>{ if(!nf.name.trim()||!nf.amount)return; onSave(Object.assign({}, settings, { fixedCosts:settings.fixedCosts.concat([Object.assign({id:Date.now().toString()},nf)]) })); setNf({name:'',amount:'',categoryId:''}); }, full:true }, '＋ 追加する')
      ),
      h('div', { style:card },
        h('p', { style:cardTitle }, '🏠 固定費一覧'),
        settings.fixedCosts.length === 0 && h('p', { style:{ color:C.textLight, fontSize:13, textAlign:'center', padding:'8px 0' } }, 'まだありません'),
        settings.fixedCosts.map(f => {
          const cat = settings.categories.find(c => c.id === f.categoryId);
          return h('div', { key:f.id, style:{ display:'flex', alignItems:'center', gap:8, padding:'9px 0', borderBottom:'1px dashed ' + C.border } },
            h('div', { style:{ flex:1 } },
              h('p', { style:{ fontWeight:700, fontSize:13, color:C.text } }, f.name),
              cat && h(Tag, { icon:cat.icon, name:cat.name, color:cat.color, small:true })
            ),
            h('span', { style:{ fontWeight:700, fontSize:15, color:C.pink } }, fmt(f.amount)),
            h(PillBtn, { onClick:()=>onSave(Object.assign({}, settings, { fixedCosts:settings.fixedCosts.filter(x=>x.id!==f.id) })), variant:'danger', size:'sm' }, '✕')
          );
        }),
        settings.fixedCosts.length > 0 && h('div', { style:{ textAlign:'right', marginTop:10, fontWeight:700, color:C.text, fontSize:15 } }, '合計：' + fmt(settings.fixedCosts.reduce((s, f) => s + Number(f.amount), 0)))
      )
    ),

    sub === 'apikey' && h(ApiKeyPanel, null)
  );
}

// ── 今日の支出 ────────────────────────────────────────────
function DailyView(props) {
  const { settings, onDataChange } = props;
  const [date,       setDate]      = useState(todayStr());
  const [expenses,   setExpenses]  = useState([]);
  const [loading,    setLoading]   = useState(false);
  const [parsed,     setParsed]    = useState(null);
  const [inputText,  setInputText] = useState('');
  const [imgPreview, setImgPreview]= useState(null);
  const [manualOpen, setManualOpen]= useState(false);
  const [mf,         setMf]        = useState({ categoryId:'', amount:'', note:'' });
  const [toast,      setToast]     = useState('');
  const [editingId,  setEditingId] = useState(null);
  const [editForm,   setEditForm]  = useState({ categoryId:'', amount:'', note:'' });
  const fileRef = useRef(null);

  useEffect(() => { setExpenses(loadDayData(date)); }, [date]);

  const saveExp = list => {
    setExpenses(list);
    saveDayData(date, list);
    loadMonthDataCached(date, true);
    onDataChange();
  };

  const showToast = msg => { setToast(msg); setTimeout(() => setToast(''), 2400); };

  const handleTextSubmit = async () => {
    if (!inputText.trim()) return;
    setLoading(true); setParsed(null);
    try {
      const r = await parseNaturalInput(inputText, settings.categories);
      if (r && r.length > 0) { setParsed(r); }
      else { showToast('💦 解析できませんでした。手動入力をお試しください'); }
    } catch (e) {
      showToast('❌ ' + e.message);
    } finally {
      setLoading(false);
    }
  };

  const handleImageFile = async e => {
    const file = e.target.files && e.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = async ev => {
      const dataUrl = ev.target.result;
      setImgPreview(dataUrl); setLoading(true); setParsed(null);
      try {
        const r = await parseReceipt(dataUrl.split(',')[1], settings.categories);
        if (r && r.length > 0) { setParsed(r); }
        else { showToast('💦 レシートを読み取れませんでした'); }
      } catch (e) {
        showToast('❌ ' + e.message);
      } finally {
        setLoading(false);
      }
    };
    reader.readAsDataURL(file);
    e.target.value = '';
  };

  const confirmParsed = () => {
    const newList = expenses.concat(parsed.map(p => Object.assign({ id: Date.now().toString() + Math.random() }, p)));
    saveExp(newList); setParsed(null); setInputText(''); setImgPreview(null);
    showToast('✨ ' + parsed.length + '件を追加しました！');
  };

  const addManual = () => {
    if (!mf.categoryId || !mf.amount) return;
    saveExp(expenses.concat([Object.assign({ id: Date.now().toString() }, mf)]));
    setMf({ categoryId:'', amount:'', note:'' }); setManualOpen(false); showToast('✨ 追加しました！');
  };

  const saveEdit = () => {
    if (!editForm.categoryId || !editForm.amount) return;
    saveExp(expenses.map(e => e.id === editingId ? Object.assign({}, e, editForm) : e));
    setEditingId(null); showToast('✏️ 編集しました');
  };

  const dayTotal = expenses.reduce((s, e) => s + Number(e.amount), 0);
  const catTotals = {};
  expenses.forEach(e => { catTotals[e.categoryId] = (catTotals[e.categoryId] || 0) + Number(e.amount); });

  return h('div', null,
    h(Toast, { msg:toast }),

    h('div', { style:Object.assign({}, card, { display:'flex', alignItems:'center', gap:10 }) },
      h('span', { style:{ fontSize:20 } }, '📅'),
      h('input', { type:'date', style:Object.assign({}, inp, { flex:1 }), value:date, onChange:e=>setDate(e.target.value) })
    ),

    h('div', { style:card },
      h('p', { style:cardTitle }, '💸 今日の支出'),
      h('p', { style:{ fontSize:11, color:C.textSub, marginBottom:10, lineHeight:1.6 } }, '「スーパー3000円」など自然な言葉でOK！複数行もOK📝'),
      h('div', { style:{ display:'flex', gap:7, marginBottom:10, alignItems:'flex-start' } },
        h('textarea', { style:Object.assign({}, inp, { flex:1, minHeight:80, resize:'vertical', lineHeight:1.7, paddingTop:11 }), placeholder:'例：スーパーで3000円\nコンビニ450円\nランチ900円', value:inputText, onChange:e=>setInputText(e.target.value), onKeyDown:e=>{ if(e.key==='Enter'&&(e.ctrlKey||e.metaKey)){e.preventDefault();handleTextSubmit();} } }),
        h('button', { onClick:()=>fileRef.current&&fileRef.current.click(), style:{ width:42, height:42, borderRadius:13, flexShrink:0, cursor:'pointer', fontSize:19, border:'1.5px solid ' + C.border, background:'white', display:'flex', alignItems:'center', justifyContent:'center', transition:'all .2s', marginTop:1 } }, '📷'),
        h('input', { ref:fileRef, type:'file', accept:'image/*', capture:'environment', style:{ display:'none' }, onChange:handleImageFile })
      ),
      h('p', { style:{ fontSize:10, color:C.textLight, marginBottom:8, textAlign:'right' } }, 'Ctrl+Enter で送信'),
      h(PillBtn, { onClick:handleTextSubmit, disabled:loading||!inputText.trim(), full:true }, loading ? '⏳ AI解析中…' : '✨ カテゴリを自動判定する'),

      imgPreview && h('div', { style:{ marginTop:10, borderRadius:12, overflow:'hidden', border:'1px solid ' + C.border, maxHeight:150 } },
        h('img', { src:imgPreview, alt:'receipt', style:{ width:'100%', objectFit:'contain', maxHeight:150 } })
      ),

      parsed && h('div', { className:'slideUp', style:{ marginTop:12, background:'#FFF8FB', borderRadius:14, padding:'12px', border:'1.5px solid ' + C.pinkL } },
        h('p', { style:{ fontSize:12, fontWeight:700, color:C.text, marginBottom:8 } }, '✅ これでよい？'),
        parsed.map((p, i) => {
          const cat = settings.categories.find(c => c.id === p.categoryId);
          return h('div', { key:i, style:{ display:'flex', alignItems:'center', gap:8, padding:'6px 0', borderBottom:i<parsed.length-1?'1px dashed '+C.border:'none' } },
            cat ? h(Tag, { icon:cat.icon, name:cat.name, color:cat.color, small:true }) : h('span', { style:{ fontSize:12, color:C.textSub } }, '不明'),
            h('span', { style:{ fontSize:12, color:C.textSub, flex:1 } }, p.note),
            h('span', { style:{ fontWeight:700, color:C.pink, fontSize:14 } }, fmt(p.amount))
          );
        }),
        h('div', { style:{ display:'flex', gap:8, marginTop:10 } },
          h(PillBtn, { onClick:confirmParsed, variant:'mint', style:{ flex:1 } }, '✓ 追加する'),
          h(PillBtn, { onClick:()=>{setParsed(null);setImgPreview(null);}, variant:'ghost', style:{ flex:1 } }, '✕ キャンセル')
        )
      )
    ),

    h('button', { onClick:()=>setManualOpen(v=>!v), style:{ width:'100%', padding:'9px', borderRadius:13, border:'1.5px dashed ' + C.border, background:'white', color:C.textSub, fontFamily:font, fontSize:12, fontWeight:700, cursor:'pointer', marginBottom:13, transition:'all .2s' } },
      manualOpen ? '▲ 手動入力を閉じる' : '▼ 手動でカテゴリ指定して入力'
    ),

    manualOpen && h('div', { style:Object.assign({}, card, { animation:'slideUp .3s ease' }) },
      h('p', { style:cardTitle }, '✏️ 手動入力'),
      h('p', { style:lbl }, 'カテゴリ'),
      h('select', { style:Object.assign({}, inp, { cursor:'pointer', marginBottom:10 }), value:mf.categoryId, onChange:e=>setMf(Object.assign({},mf,{categoryId:e.target.value})) },
        h('option', { value:'' }, '選んでください'),
        settings.categories.map(c => h('option', { key:c.id, value:c.id }, c.icon + ' ' + c.name))
      ),
      h('p', { style:lbl }, '金額（円）'),
      h('input', { style:Object.assign({}, inp, { marginBottom:10 }), type:'number', placeholder:'0', value:mf.amount, onChange:e=>setMf(Object.assign({},mf,{amount:e.target.value})) }),

// ── カレンダー ────────────────────────────────────────────
function CalendarView(props) {
  const { settings, dataVersion } = props;
  const today = todayStr();
  const [monthRef,     setMonthRef]    = useState(getMonthStart(today));
  const [dailyTotals,  setDailyTotals] = useState({});
  const [dailyItems,   setDailyItems]  = useState({});
  const [loading,      setLoading]     = useState(false);
  const [selected,     setSelected]    = useState(null);

  const applyData = raw => {
    const totals = {};
    Object.entries(raw).forEach(([d, items]) => { totals[d] = items.reduce((s, i) => s + Number(i.amount), 0); });
    setDailyTotals(totals); setDailyItems(raw);
  };

  useEffect(() => {
    setSelected(null);
    const force = dataVersion > 0;
    if (!force && monthCache[monthRef]) { applyData(monthCache[monthRef]); setLoading(false); return; }
    setLoading(true);
    const data = loadMonthDataCached(monthRef, force);
    applyData(data); setLoading(false);
  }, [monthRef, dataVersion]);

  function buildGrid() {
    const s = new Date(monthRef), y = s.getFullYear(), m = s.getMonth();
    const dim = new Date(y, m + 1, 0).getDate(), fdow = s.getDay();
    const cells = [];
    for (let i = 0; i < fdow; i++) cells.push(null);
    for (let d = 1; d <= dim; d++) cells.push(y + '-' + String(m+1).padStart(2,'0') + '-' + String(d).padStart(2,'0'));
    return cells;
  }

  const cells     = buildGrid();
  const monthTotal= Object.values(dailyTotals).reduce((s, v) => s + v, 0);
  const maxDay    = Object.values(dailyTotals).length > 0 ? Math.max.apply(null, Object.values(dailyTotals)) : 1;
  const cellBg    = ds => { const a = dailyTotals[ds] || 0; if (!a) return 'white'; const r = Math.min(a / Math.max(maxDay, 1), 1); return 'rgb(255,' + (Math.round(214 - r*80)|0) + ',' + (Math.round(230 - r*70)|0) + ')'; };
  const DOW       = ['日','月','火','水','木','金','土'];
  const selItems  = selected ? (dailyItems[selected] || []) : [];
  const selTotal  = selItems.reduce((s, i) => s + Number(i.amount), 0);
  const navBt     = { width:36, height:36, borderRadius:12, border:'1.5px solid ' + C.border, background:C.bgSoft, cursor:'pointer', fontSize:18, display:'flex', alignItems:'center', justifyContent:'center' };

  return h('div', null,
    h('div', { style:Object.assign({}, card, { padding:'12px 16px' }) },
      h('div', { style:{ display:'flex', alignItems:'center', justifyContent:'space-between' } },
        h('button', { onClick:()=>{ const d=new Date(monthRef);d.setMonth(d.getMonth()-1);setMonthRef(getMonthStart(d.toISOString().split('T')[0])); }, style:navBt }, '‹'),
        h('div', { style:{ textAlign:'center' } },
          h('p', { style:{ fontSize:17, fontWeight:700, color:C.text, letterSpacing:2 } }, fmtMonth(monthRef)),
          !loading && monthTotal > 0 && h('p', { style:{ fontSize:12, color:C.textSub, marginTop:2 } }, '合計 ', h('span', { style:{ fontWeight:700, color:C.pink } }, fmt(monthTotal)))
        ),
        h('button', { onClick:()=>{ const d=new Date(monthRef);d.setMonth(d.getMonth()+1);setMonthRef(getMonthStart(d.toISOString().split('T')[0])); }, style:navBt }, '›')
      )
    ),

    h('div', { style:Object.assign({}, card, { padding:'14px 10px' }) },
      h('div', { style:{ display:'grid', gridTemplateColumns:'repeat(7,1fr)', marginBottom:6 } },
        DOW.map((d, i) => h('div', { key:d, style:{ textAlign:'center', fontSize:11, fontWeight:700, padding:'4px 0', color:i===0?'#E57373':i===6?'#7CB9E8':C.textSub } }, d))
      ),
      h('div', { style:{ display:'grid', gridTemplateColumns:'repeat(7,1fr)', gap:3, position:'relative' } },
        loading && h('div', { style:{ position:'absolute', inset:0, background:'rgba(255,245,250,.75)', borderRadius:10, zIndex:5, display:'flex', alignItems:'center', justifyContent:'center' } },
          h('span', { style:{ fontSize:22, animation:'floatAnim 1s ease-in-out infinite' } }, '🌸')
        ),
        cells.map((ds, idx) => {
          if (!ds) return h('div', { key:'b' + idx });
          const dn = parseInt(ds.split('-')[2]), dow = new Date(ds).getDay();
          const isTd = ds === today, isSel = ds === selected, amt = dailyTotals[ds] || 0, has = amt > 0;
          return h('button', { key:ds, onClick:()=>setSelected(isSel?null:ds), style:{ borderRadius:12, border:'2px solid ' + (isSel?C.pink:isTd?C.lavender:'1px solid '+(has?C.pinkL:C.border)), background:isSel?C.pinkL:cellBg(ds), cursor:'pointer', padding:'5px 2px 6px', display:'flex', flexDirection:'column', alignItems:'center', gap:2, transition:'all .15s', minHeight:52, boxShadow:isSel?'0 3px 12px '+C.shadow:'none' } },
            h('span', { style:{ fontSize:12, fontWeight:isTd?700:600, lineHeight:1, color:isTd?C.pink:dow===0?'#E57373':dow===6?'#7CB9E8':C.text } },
              isTd ? h('span', { style:{ background:C.pink, color:'white', borderRadius:'50%', width:18, height:18, display:'inline-flex', alignItems:'center', justifyContent:'center', fontSize:11 } }, dn) : dn
            ),
            has ? h('span', { style:{ fontSize:9, fontWeight:700, color:darken(C.pink), lineHeight:1.2, textAlign:'center' } }, fmt(amt))
                : h('span', { style:{ fontSize:9, color:C.textLight } }, '—')
          );
        })
      ),
      h('div', { style:{ display:'flex', alignItems:'center', gap:6, marginTop:12, justifyContent:'flex-end' } },
        h('span', { style:{ fontSize:10, color:C.textLight } }, '少'),
        ['#FFF5F8','#FFE0EC','#FFCCE0','#FFAACF','#FF85B8'].map(cl => h('div', { key:cl, style:{ width:12, height:12, borderRadius:3, background:cl, border:'1px solid #FFD6E7' } })),
        h('span', { style:{ fontSize:10, color:C.textLight } }, '多')
      )
    ),

    selected && h('div', { style:Object.assign({}, card, { animation:'slideUp .25s ease', border:'1.5px solid ' + C.pinkL }) },
      h('div', { style:Object.assign({}, cardTitle, { display:'flex', alignItems:'center', justifyContent:'space-between' }) },
        h('span', null, '📋 ' + fmtDate(selected) + ' の支出'),
        h('button', { onClick:()=>setSelected(null), style:{ border:'none', background:'none', cursor:'pointer', fontSize:16, color:C.textLight } }, '✕')
      ),
      selItems.length === 0
        ? h('p', { style:{ color:C.textLight, fontSize:13, textAlign:'center', padding:'12px 0' } }, 'この日は支出なし 🌿')
        : h(Fragment, null,
            (() => {
              const catT = {};
              selItems.forEach(e => { catT[e.categoryId] = (catT[e.categoryId] || 0) + Number(e.amount); });
              return Object.entries(catT).sort((a,b)=>b[1]-a[1]).map(([catId, total]) => {
                const cat = settings.categories.find(c => c.id === catId);
                if (!cat) return null;
                const pct = selTotal > 0 ? total / selTotal * 100 : 0;
                return h('div', { key:catId, style:{ marginBottom:10 } },
                  h('div', { style:{ display:'flex', justifyContent:'space-between', alignItems:'center', marginBottom:4 } },
                    h(Tag, { icon:cat.icon, name:cat.name, color:cat.color, small:true }),
                    h('span', { style:{ fontWeight:700, fontSize:13, color:C.text } }, fmt(total))
                  ),
                  h('div', { style:{ height:5, background:'#F7EEF7', borderRadius:4, overflow:'hidden' } },
                    h('div', { style:{ height:'100%', width:pct+'%', background:'linear-gradient(90deg,'+cat.color+'99,'+cat.color+')', borderRadius:4, transition:'width .4s ease' } })
                  )
                );
              });
            })(),
            h('div', { style:{ borderTop:'1px dashed ' + C.border, marginTop:8, paddingTop:8 } },
              selItems.map((e, i) => {
                const cat = settings.categories.find(c => c.id === e.categoryId);
                return h('div', { key:i, style:{ display:'flex', alignItems:'center', gap:8, padding:'5px 0', borderBottom:i<selItems.length-1?'1px dashed '+C.border:'none' } },
                  h('span', { style:{ fontSize:16 } }, (cat && cat.icon) || '❓'),
                  h('span', { style:{ flex:1, fontSize:12, color:C.textSub } }, e.note || (cat && cat.name) || '支出'),
                  h('span', { style:{ fontWeight:700, fontSize:13, color:C.text } }, fmt(e.amount))

              })

            h('div', { style:{ display:'flex', justifyContent:'space-between', alignItems:'center', marginTop:10, paddingTop:10, borderTop:'2px dashed ' + C.pinkL } },
              h('span', { style:{ fontSize:12, fontWeight:700, color:C.textSub } }, '合計'),
              h('span', { style:{ fontSize:18, fontWeight:700, color:C.pink } }, fmt(selTotal))
            )
          )
    ),

    !loading && monthTotal > 0 && h('div', { style:card },
      h('p', { style:cardTitle }, '📊 月間サマリー'),
      (() => {
        const catT = {};
        Object.values(dailyItems).forEach(items => items.forEach(e => { catT[e.categoryId] = (catT[e.categoryId] || 0) + Number(e.amount); }));
        return Object.entries(catT).sort((a,b)=>b[1]-a[1]).map(([catId, total]) => {

          if (!cat) return null;

              h('div', { style:{ textAlign:'right' } },
                h('span', { style:{ fontWeight:700, fontSize:13, color:C.text } }, fmt(total)),
                h('span', { style:{ fontSize:10, color:C.textLight, marginLeft:5 } }, pct.toFixed(0) + '%')

              h('div', { style:{ height:'100%', width:pct+'%', background:'linear-gradient(90deg,'+cat.color+'99,'+cat.color+')', borderRadius:4, transition:'width .5s ease' } })
            )

        h('span', { style:{ fontSize:13, fontWeight:700, color:C.textSub } }, '月合計（変動費）'),
        h('span', { style:{ fontSize:20, fontWeight:700, color:C.pink } }, fmt(monthTotal))
      )

    !loading && monthTotal === 0 && h('div', { style:{ textAlign:'center', color:C.textLight, marginTop:20, fontSize:14 } },

// ── レポート ──────────────────────────────────────────────
function ReportsView(props) {
  const { settings } = props;
  const MODES = [['weekly-summary','📊','週まとめ'],['weekly-analysis','🔍','週分析'],['monthly-summary','📅','月まとめ'],['monthly-analysis','💡','月分析']];
  const [mode,         setMode]         = useState(null);
  const [rTab,         setRTab]         = useState('generate');
  const [weekStart,    setWeekStart]    = useState(getMonday(todayStr()));
  const [monthRef,     setMonthRef]     = useState(getMonthStart(todayStr()));
  const [result,       setResult]       = useState('');
  const [loading,      setLoading]      = useState(false);
  const [prev,         setPrev]         = useState(null);
  const [savedReports, setSavedReports] = useState([]);
  const [viewing,      setViewing]      = useState(null);

  useEffect(() => { const r = sg('saved-reports'); if (r) { try { setSavedReports(JSON.parse(r)); } catch(e){} } }, []);

  const saveReport = () => {
    if (!result || !mode) return;
    const modeLabel = (MODES.find(m => m[0] === mode) || [])[2] || mode;
    const isW  = mode.startsWith('weekly');
    const label = isW ? fmtDate(weekStart) + '〜' + fmtDate(addDays(weekStart, 6)) : fmtMonth(monthRef);
    const entry = { id:Date.now().toString(), mode, modeLabel, label, savedAt:new Date().toLocaleString('ja-JP',{month:'numeric',day:'numeric',hour:'2-digit',minute:'2-digit'}), content:result };
    const updated = [entry].concat(savedReports).slice(0, 30);
    setSavedReports(updated);
    ss('saved-reports', JSON.stringify(updated));
    alert('✨ 保存しました！「履歴」タブから見返せます');
  };

  const deleteReport = id => {
    const updated = savedReports.filter(r => r.id !== id);
    setSavedReports(updated);
    ss('saved-reports', JSON.stringify(updated));
    if (viewing && viewing.id === id) setViewing(null);
  };

  const generate = async () => {
    if (!mode) return;
    setLoading(true); setResult('');
    try {
      const isW  = mode.startsWith('weekly');
      const start = isW ? weekStart : monthRef;
      const end   = isW ? addDays(weekStart, 6) : getMonthEnd(monthRef);

      const expByDate  = loadRange(start, end);
      const { catMap, grandTotal } = summarize(settings, expByDate);
      const days       = Math.max(Object.keys(expByDate).length, 1);
      setPrev({ grandTotal, days });

      const fixedTotal = settings.fixedCosts.reduce((s, f) => s + Number(f.amount), 0);
      const catLines   = Object.values(catMap).filter(c => c.total > 0).sort((a,b) => b.total-a.total).map(c => '  ' + c.icon + c.name + ': ' + fmt(c.total) + ' (' + c.items.length + '件)').join('\n') || '  データなし';
      const fixedLines = settings.fixedCosts.map(f => { const cat = settings.categories.find(c => c.id === f.categoryId); return '  ' + f.name + ': ' + fmt(f.amount) + (cat ? ' (' + cat.name + ')' : ''); }).join('\n') || '  設定なし';
      const dailyLines = Object.entries(expByDate).sort((a,b)=>a[0]<b[0]?-1:1).map(([date, items]) => {
        const s = items.reduce((acc, i) => acc + Number(i.amount), 0);
        const d = items.map(i => { const cat = settings.categories.find(c => c.id === i.categoryId); return '    ' + (cat ? cat.name : '不明') + ' ' + fmt(i.amount) + (i.note ? ' (' + i.note + ')' : ''); }).join('\n');
        return '  ' + fmtDate(date) + ': ' + fmt(s) + '\n' + d;
      }).join('\n') || '  データなし';

      let prompt = '';
      if (mode === 'weekly-summary') {
        prompt = '家計アドバイザー。1週間支出データをまとめてください。\n【期間】' + fmtDate(start) + '〜' + fmtDate(end) + '\n【固定費(月額)】\n' + fixedLines + '\n合計:' + fmt(fixedTotal) + '\n【変動費明細】\n' + dailyLines + '\n【カテゴリ別合計】\n' + catLines + '\n【変動費合計】' + fmt(grandTotal) + ' 【1日平均】' + fmt(Math.round(grandTotal / days)) + '\n\n絵文字を使って親しみやすく以下をまとめてください：\n📊 カテゴリ別合計（金額・割合）\n📅 1日の平均支出\n📝 支出傾向（全体の特徴・使いすぎカテゴリ・良かった点）';
      } else if (mode === 'weekly-analysis') {
        prompt = '家計アドバイザー。1週間を詳しく分析してください。\n【期間】' + fmtDate(start) + '〜' + fmtDate(end) + '\n【固定費】\n' + fixedLines + '\n【変動費明細】\n' + dailyLines + '\n【カテゴリ別】\n' + catLines + '\n合計:' + fmt(grandTotal) + '\n\n絵文字と具体的な数字で以下を分析してください：\n💸 無駄な出費（具体的に）\n🎯 削減インパクト大トップ3\n🏠 固定費の見直し余地\n⚡ 今すぐできる節約アクション3つ\n📋 来週の最適予算（カテゴリ別）\n⚠️ 注意すべき支出パターン';
      } else if (mode === 'monthly-summary') {
        const end2 = getMonthEnd(monthRef);
        const ws = [];
        let wn = 1, wd = monthRef;
        while (wd <= end2) {
          const we = addDays(wd, 6) > end2 ? end2 : addDays(wd, 6);
          const wt = Object.entries(expByDate).filter(([dt]) => dt >= wd && dt <= we).reduce((s, [, it]) => s + it.reduce((acc, i) => acc + Number(i.amount), 0), 0);
          ws.push('  第' + wn + '週(' + fmtDate(wd) + '〜' + fmtDate(we) + '): ' + fmt(wt));
          wd = addDays(we, 1); wn++;
        }
        prompt = '家計アドバイザー。1ヶ月をまとめてください。\n【期間】' + fmtMonth(monthRef) + '\n【固定費】\n' + fixedLines + '\n合計:' + fmt(fixedTotal) + '\n【変動費カテゴリ別】\n' + catLines + '\n合計:' + fmt(grandTotal) + '\n【総支出】' + fmt(grandTotal + fixedTotal) + ' 【1日平均】' + fmt(Math.round(grandTotal / days)) + '\n【週別(変動費)】\n' + ws.join('\n') + '\n\n絵文字と具体的な数字で以下をまとめてください：\n💰 1ヶ月の総支出（固定費＋変動費）\n🏠 固定費の内訳と合計\n📊 変動費カテゴリ別内訳\n📅 週別内訳\n📈 1日の平均支出\n📝 支出傾向（全体の特徴・増減ポイント・使いすぎカテゴリ・良かった点）';
      } else if (mode === 'monthly-analysis') {
        prompt = '家計アドバイザー。1ヶ月を徹底分析してください。\n【期間】' + fmtMonth(monthRef) + '\n【固定費】\n' + fixedLines + '\n【変動費カテゴリ別】\n' + catLines + '\n合計:' + fmt(grandTotal) + '\n【総支出】' + fmt(grandTotal + fixedTotal) + '\n【全明細】\n' + dailyLines + '\n\n絵文字と具体的な数字で以下を分析してください：\n🗑️ 無駄遣いランキング（1〜3位、削減可能額も）\n🏠 固定費の見直しポイント\n🎯 削減インパクト大トップ3\n⚖️ 理想の支出バランス\n📋 来月の最適予算（カテゴリ別）\n💰 貯金を増やすための具体プラン';
      }

      const text = await callAI([{ role:'user', content:prompt }], 1500);
      setResult(text);
    } catch (e) {
      setResult('❌ エラーが発生しました\n\n' + e.message + '\n\nAPIキーを設定タブ → 🤖 AIキー から確認してください。');
    } finally {
      setLoading(false);
    }
  };

  const tb = k => ({ flex:1, padding:'10px', borderRadius:13, border:'2px solid ' + (rTab===k?C.pink:C.border), background:rTab===k?C.pinkL:'white', color:rTab===k?C.text:C.textSub, fontFamily:font, fontWeight:700, fontSize:13, cursor:'pointer', transition:'all .2s' });
  const modeInfo = m => MODES.find(x => x[0] === m) || ['','',''];

  return h('div', null,
    h('div', { style:{ display:'flex', gap:8, marginBottom:14 } },
      h('button', { onClick:()=>{ setRTab('generate'); setViewing(null); }, style:tb('generate') }, '✨ 生成'),
      h('button', { onClick:()=>{ setRTab('history');  setViewing(null); }, style:tb('history') },  '📁 履歴' + (savedReports.length > 0 ? ' (' + savedReports.length + ')' : ''))
    ),

    rTab === 'generate' && h(Fragment, null,
      h('div', { style:card },
        h('p', { style:cardTitle }, '✨ レポートの種類'),
        h('div', { style:{ display:'grid', gridTemplateColumns:'1fr 1fr', gap:10 } },
          MODES.map(([k, ic, l]) =>
            h('button', { key:k, onClick:()=>{ setMode(k); setResult(''); setPrev(null); }, style:{ padding:'14px 8px', borderRadius:16, cursor:'pointer', fontFamily:font, border:'2px solid '+(mode===k?C.pink:C.border), background:mode===k?'linear-gradient(135deg,#FFE0EC,#EDD5FF)':'white', color:mode===k?C.text:C.textSub, fontSize:12, fontWeight:700, transition:'all .2s', lineHeight:1.6 } },
              h('span', { style:{ fontSize:18 } }, ic), h('br'), l
            )
          )
        )
      ),

      mode && h('div', { style:card },
        h('p', { style:cardTitle }, '📅 期間を選択'),
        mode.startsWith('weekly')
          ? h(Fragment, null,
              h('p', { style:lbl }, '週の開始日（月曜日）'),
              h('input', { type:'date', style:inp, value:weekStart, onChange:e=>{ setWeekStart(getMonday(e.target.value)); setResult(''); } }),
              h('p', { style:{ fontSize:11, color:C.textSub, marginTop:6 } }, fmtDate(weekStart) + ' 〜 ' + fmtDate(addDays(weekStart, 6)))
            )
          : h(Fragment, null,
              h('p', { style:lbl }, '対象月'),
              h('input', { type:'month', style:inp, value:monthRef.substring(0, 7), onChange:e=>{ setMonthRef(e.target.value + '-01'); setResult(''); } })
            )
      ),

      mode && h(PillBtn, { onClick:generate, disabled:loading, variant:'lavender', full:true, style:{ padding:'14px', fontSize:14, marginBottom:13 } },
        loading ? '⏳ AI分析中…' : '✨ ' + modeInfo(mode)[2] + 'を生成する'
      ),

      prev && !loading && h('div', { style:Object.assign({}, card, { background:'linear-gradient(135deg,#FFE0EC,#EDD5FF)' }) },
        h('div', { style:{ display:'flex', justifyContent:'space-around' } },
          [['変動費合計', fmt(prev.grandTotal)], ['1日平均', fmt(Math.round(prev.grandTotal / prev.days))]].map(([lb, val]) =>
            h('div', { key:lb, style:{ textAlign:'center' } },
              h('p', { style:{ fontSize:11, color:C.textSub, fontWeight:700 } }, lb),
              h('p', { style:{ fontSize:18, fontWeight:700, color:C.text } }, val)
            )
          )
        )
      ),

      result && h('div', { style:card },
        h('div', { style:Object.assign({}, cardTitle, { display:'flex', justifyContent:'space-between', alignItems:'center' }) },
          h('span', null, modeInfo(mode)[1] + ' ' + modeInfo(mode)[2] + 'レポート'),
          h(PillBtn, { onClick:saveReport, variant:'mint', size:'sm' }, '💾 保存')
        ),
        h('div', { style:{ background:'#FFF8FB', border:'1px solid ' + C.border, borderRadius:14, padding:'15px', fontSize:13, lineHeight:2.0, color:C.text, whiteSpace:'pre-wrap', fontFamily:font } }, result)
      ),

      !mode && h('div', { style:{ textAlign:'center', color:C.textLight, marginTop:28, fontSize:14 } },
        h('p', { style:{ fontSize:38, marginBottom:10, animation:'floatAnim 3s ease-in-out infinite' } }, '🌸'),
        h('p', null, 'レポートの種類を選んでね'),
        h('p', { style:{ fontSize:12, marginTop:4 } }, '週・月ごとにAIが分析してくれるよ✨')
      )
    ),

    rTab === 'history' && h(Fragment, null,
      viewing
        ? h('div', { style:card },
            h('div', { style:Object.assign({}, cardTitle, { display:'flex', justifyContent:'space-between', alignItems:'center' }) },
              h('div', null,
                h('span', { style:{ fontSize:14 } }, modeInfo(viewing.mode)[1] + ' ' + viewing.modeLabel),
                h('p', { style:{ fontSize:11, color:C.textSub, marginTop:2 } }, viewing.label + ' · ' + viewing.savedAt)
              ),
              h(PillBtn, { onClick:()=>setViewing(null), variant:'ghost', size:'sm' }, '← 戻る')
            ),
            h('div', { style:{ background:'#FFF8FB', border:'1px solid ' + C.border, borderRadius:14, padding:'15px', fontSize:13, lineHeight:2.0, color:C.text, whiteSpace:'pre-wrap', fontFamily:font } }, viewing.content),
            h('div', { style:{ marginTop:12 } },
              h(PillBtn, { onClick:()=>deleteReport(viewing.id), variant:'danger', full:true }, '🗑️ このレポートを削除')
            )
          )
        : savedReports.length === 0
          ? h('div', { style:{ textAlign:'center', color:C.textLight, marginTop:28, fontSize:14 } },
              h('p', { style:{ fontSize:38, marginBottom:10 } }, '📁'),
              h('p', null, '保存されたレポートはありません'),
              h('p', { style:{ fontSize:12, marginTop:4 } }, '生成タブでレポートを作って「💾 保存」を押してね')
            )
          : savedReports.map(r =>
              h('div', { key:r.id, style:Object.assign({}, card, { cursor:'pointer' }), onClick:()=>setViewing(r) },
                h('div', { style:{ display:'flex', alignItems:'center', gap:12 } },
                  h('span', { style:{ fontSize:24 } }, modeInfo(r.mode)[1] || '📊'),
                  h('div', { style:{ flex:1 } },
                    h('p', { style:{ fontWeight:700, fontSize:13, color:C.text } }, r.modeLabel + ' · ' + r.label),
                    h('p', { style:{ fontSize:11, color:C.textSub, marginTop:2 } }, '保存日時: ' + r.savedAt)
                  ),
                  h('span', { style:{ color:C.textLight, fontSize:16 } }, '›')
                )
              )
            )
    )
  );
}

// ── アプリ ────────────────────────────────────────────────
function App() {
  const [tab,         setTab]        = useState('daily');
  const [settings,    setSettings]   = useState(null);
  const [unlocked,    setUnlocked]   = useState(false);
  const [dataVersion, setDataVersion]= useState(0);

  useEffect(() => {
    if (localStorage.getItem('kakeibo-unlocked') === '1') setUnlocked(true);
  }, []);

  useEffect(() => {
    if (!unlocked) return;
    const raw = sg('kakeibo-settings');
    if (raw) {
      try { setSettings(JSON.parse(raw)); } catch(e) { setSettings({ categories:DEFAULT_CATEGORIES, fixedCosts:[] }); }
    } else {
      const init = { categories:DEFAULT_CATEGORIES, fixedCosts:[] };
      setSettings(init);
      ss('kakeibo-settings', JSON.stringify(init));
    }
    // カレンダー高速化のため先読み
    const thisMonth = getMonthStart(todayStr());
    const dt = new Date(thisMonth); dt.setMonth(dt.getMonth() - 1);
    const lastMonth = getMonthStart(dt.toISOString().split('T')[0]);
    loadMonthDataCached(thisMonth);
    loadMonthDataCached(lastMonth);
  }, [unlocked]);

  const saveSettings = useCallback(s => {
    setSettings(s);
    ss('kakeibo-settings', JSON.stringify(s));
  }, []);

  if (!unlocked) return h(LockScreen, { onUnlock:() => { localStorage.setItem('kakeibo-unlocked', '1'); setUnlocked(true); } });

  if (!settings) return h('div', { style:{ display:'flex', flexDirection:'column', alignItems:'center', justifyContent:'center', height:'100vh', background:C.bg, fontFamily:font, gap:14 } },
    h('div', { style:{ fontSize:46, animation:'floatAnim 2s ease-in-out infinite' } }, '🌸'),
    h('p', { style:{ fontSize:15, letterSpacing:4, color:C.textSub } }, 'よみこみ中…')
  );

  const TABS = [['daily','📅','今日'],['calendar','🗓️','カレンダー'],['reports','✨','レポート'],['setup','🌸','設定']];

  return h('div', { style:{ maxWidth:480, margin:'0 auto', minHeight:'100vh', background:C.bg, display:'flex', flexDirection:'column', fontFamily:font } },
    h('header', { style:{ background:'linear-gradient(135deg,#FFE0EC,#EDD5FF 55%,#C5EDF5)', padding:'18px 20px 14px', borderBottom:'1px solid ' + C.border } },
      h('div', { style:{ display:'flex', alignItems:'center', justifyContent:'center', gap:10 } },
        h('span', { style:{ fontSize:26, animation:'floatAnim 3s ease-in-out infinite' } }, '🌸'),
        h('h1', { style:{ fontFamily:"'Klee One',serif", fontSize:21, fontWeight:600, color:C.text, letterSpacing:7 } }, 'かけいぼ'),
        h('span', { style:{ fontSize:26, animation:'floatAnim 3s ease-in-out infinite', animationDelay:'.6s' } }, '💕')
      )
    ),
    h('nav', { style:{ display:'flex', background:'white', borderBottom:'1px solid ' + C.border, boxShadow:'0 2px 10px ' + C.shadow, position:'sticky', top:0, zIndex:30 } },
      TABS.map(([k, ic, lb]) =>
        h('button', { key:k, onClick:()=>setTab(k), style:{ flex:1, padding:'11px 4px 10px', border:'none', cursor:'pointer', fontFamily:font, fontSize:11, fontWeight:700, letterSpacing:.5, lineHeight:1.5, background:tab===k?'linear-gradient(to bottom,#FFF0F7,white)':'transparent', color:tab===k?C.text:C.textLight, borderBottom:tab===k?'2.5px solid '+C.pink:'2.5px solid transparent', transition:'all .2s' } },
          ic, h('br'), lb
        )
      )
    ),
    h('div', { style:{ flex:1, overflowY:'auto', padding:'14px 13px 44px' } },
      tab === 'setup'    && h(SetupView,    { settings, onSave:saveSettings }),
      tab === 'daily'    && h(DailyView,    { settings, onDataChange:()=>setDataVersion(v=>v+1) }),
      tab === 'calendar' && h(CalendarView, { settings, dataVersion }),
      tab === 'reports'  && h(ReportsView,  { settings })
    )
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(h(App, null));
</script>
</body>
</html>
